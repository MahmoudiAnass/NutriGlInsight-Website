  <text x="80" y="290" font-family="Segoe UI, system-ui, sans-serif" font-size="66" font-weight="800" fill="#1A1A2E">Smarter nutrition tracking,</text>
  <text x="80" y="370" font-family="Segoe UI, system-ui, sans-serif" font-size="66" font-weight="800" fill="#F97316">powered by glycemic load</text>
  <text x="80" y="440" font-family="Segoe UI, system-ui, sans-serif" font-size="30" fill="#4b5563">See not just how much you ate — but what it does to your body.</text>
